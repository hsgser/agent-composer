# 27 — Every new ${...} expression form, in one flow.
#
# The unified grammar makes the FULL expression language available inside every
# ${...} — bindings, conditions, AND prompts (each used to have its own dialect).
# This seed exercises each form once:
#   arithmetic  + - * / % ** and unary minus, with parens for precedence
#   strings     concatenation with +  (and the upper/lower builtins)
#   lists       [ ... ] literals and list + list concatenation
#   logic       comparisons, and / or / not, membership (in / not in)
#   operators   coalesce |, default :- "quoted", required :? "quoted"
#   builtins    upper / lower / join / render_as_json
#   escape      $$ -> a literal $ in a prompt
# Agent nodes load without a model (running one needs a provider).

id: expr-ops
name: expr_ops
description: One flow exercising every new unified-${...} expression form.

input:
  topic: str
  base_weight: float = 0.02      # fraction of capital in [0, 1]
  extra_bps: int = 0             # extra basis points (1 bp = 0.01%)
  tags: Optional[list[str]]      # optional -> coalesce falls through to a literal list
  note: Optional[str]            # optional -> shows a quoted :- default
  as_of: Optional[date]

nodes:
  brief:
    kind: agent
    input:
      # required AT THE USE SITE — the message is QUOTED (a bare word reads a variable)
      topic:      ${input.topic:?"a topic is required"}

      # --- arithmetic (one span each) ---
      weight_pct: ${(input.base_weight * 100) + (input.extra_bps / 100)}  # * + / + parens
      headroom:   ${5 - input.base_weight * 100}                          # - with precedence
      budget:     ${2 ** 4}                                               # ** (power)
      remainder:  ${input.extra_bps % 10}                                 # % (modulo)
      neg_bps:    ${-input.extra_bps}                                     # unary minus

      # --- strings + builtins ---
      heading:    ${upper(input.topic) + " - position brief"}            # concat + upper()
      slug:       ${lower(input.topic)}                                   # lower()

      # --- lists + coalesce/default ---
      tag_list:   ${input.tags | ["watch", "review"]}                    # coalesce onto a list literal
      tag_line:   ${join(["#" + lower(input.topic)] + (input.tags | []), " ")}  # list + list, join()
      note_line:  ${input.note:-"n/a"}                                    # quoted :- default

      # --- logic: comparison + membership + boolean ---
      sizable:    ${input.base_weight * 100 <= 5 and input.topic not in ["", "n/a"]}

      as_of:      ${input.as_of | system.today}                          # coalesce onto the host clock
      run_id:     ${system.run_id}                                       # host-ambient namespace
    output: str
    prompt: |-
      ${heading}   (${slug})
      As of ${as_of}, run ${run_id}.
      Weight ${weight_pct}% - headroom ${headroom}%, sizable=${sizable}.
      Budget lots: ${budget}, remainder ${remainder}, neg_bps ${neg_bps}.
      Tags: ${tag_line}
      Note: ${note_line}
      All figures are in US dollars ($$).
      Raw tags: ${ render_as_json(tag_list, 2) }
      Write a neutral one-paragraph brief on ${topic}. No advice.

output: ${brief.output}

asserts:                                                # any false fails the run
  - "${input.base_weight} * 100 <= 10 and not (${input.base_weight} < 0)"   # arithmetic + not + parens
  - "${input.extra_bps} in [0, 25, 50, 100] or ${input.extra_bps} >= 0"     # membership or comparison
