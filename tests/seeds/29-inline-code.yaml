# 29 — inline CODE source. A `code:` node carries a bare body that reads `inputs` and
# `return`s a value; the engine wraps it as `def main(inputs)` and runs it IN-PROCESS
# (stdlib compile/exec) — the alternative to the `module:function` reference form (seed
# 30, its reference twin). It uses the same one-dict `inputs` convention as reference mode, so a
# body promotes to a `module:function` by copy-paste. The source is author-written and
# static (it lives in this version-controlled YAML), shipped WITH the flow, under the
# author == operator trust model. The return is validated against `output:` by the same
# write boundary reference mode uses (plus a deep serialize-once check), so inline outputs
# must be JSON-representable.

id: inline-code
name: inline_code
description: Inline `code:` source — a bare body run as `def main(inputs)` in-process.

input:
  rating: float
  label: str

nodes:
  verdict:
    kind: code
    input:
      rating: ${input.rating}
      label:  ${input.label}
    output: str
    code: |
      lean = "positive" if inputs["rating"] >= 0 else "negative"
      return f"{inputs['label']}: {lean} ({inputs['rating']:+.2f})"

output: ${verdict.output}
