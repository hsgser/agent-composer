# 28 — loop + the new expression grammar.
#
# `loop` re-runs a body flow, threading one carried record from each iteration into
# the next ('a -> 'a). Here a `refine_turn` body improves a draft and re-rates it;
# the loop keeps going UNTIL the score clears the bar (post-check predicate), capped
# by `max:`. The body's bindings reuse the new expression forms: arithmetic
# (`1.0 - input.score`) and a builtin (`upper(...)`).
#
# Contract ('a -> 'a): the body's `output:` shape must EQUAL the carried record
# (the loop `input:`), and the names the body reads must be a SUBSET of the carried
# names. Field NAMES are checked at build, field TYPES at load.
#
# Loads resolver-free: the body is an in-file `defs:` callable. Agent nodes need a
# provider to RUN; this only guarantees it LOADS.

id: refine-loop
name: refine_loop
description: A loop that re-refines a draft until its score clears a bar (until + max drivers).

input:
  seed: str                        # the initial draft

defs:
  refine_turn:                     # the body flow ('a -> 'a over {draft, score})
    input:
      draft: str                   # reads a SUBSET of the carried names
      score: float
    nodes:
      critic:
        kind: agent
        input:
          draft:    ${input.draft}
          headroom: ${1.0 - input.score}       # arithmetic in a binding (expr tie-in)
          label:    ${upper("draft")}          # a pure builtin in a binding
        output:                                # structured record == carried shape
          draft: str
          score: float
        prompt: |-
          Improve the ${label} (headroom ${headroom}) and rate the result 0..1.
          Draft:
          ${draft}
    output: ${critic.output}                   # {draft, score} == the carried record

nodes:
  polish:
    kind: loop
    call: refine_turn                          # the body (a def here; may also be a `uses:` file)
    input:                                     # the SEED carried record — defines 'a
      draft: ${input.seed}
      score: 0.0
    until: score >= 0.8                        # bare form (canonical); the mixed `${score} >= 0.8` and whole-span `${score >= 0.8}` spellings load and evaluate identically
    max: 5                                     # required runaway guard (LoopMaxExceeded)

output: ${polish.output.draft}                 # the final carried draft
