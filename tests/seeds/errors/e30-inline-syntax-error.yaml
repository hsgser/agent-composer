# e30 — a malformed inline CODE body. COMPILE: the load-time compile() syntax gate raises
# a located LoadError before any node runs (a syntax slip surfaces at LOAD, not mid-run).
# Padding puts the frame on the real YAML line of the slip.
id: err-inline-syntax
name: err_inline_syntax
input:
  topic: str
nodes:
  broken:
    kind: code
    input:
      topic: ${input.topic}
    output: str
    code: |
      return (
output: ${broken.output}
