# e29 — an inline CODE body returns a value with a NON-serializable member nested inside
# (a bare object in a dict). RUNTIME: the node's deep serialize-once check fails AT THE
# NODE (naming it), rather than letting the value slip the top-level write boundary and
# detonate later at a checkpoint. The one guarantee carried over from the deleted
# subprocess wire (which forced this via json.dump).
id: err-inline-nonserializable
name: err_inline_nonserializable
input:
  topic: str
nodes:
  bad:
    kind: code
    input:
      topic: ${input.topic}
    output: object
    code: |
      return {"topic": inputs["topic"], "handle": object()}
output: ${bad.output}
