# e31 — an inline CODE body with no `return`. COMPILE: the has-`return` load gate rejects
# it with a located LoadError before any node runs — a value-producing node that never
# returns would silently yield None. Anchored at the `code:` field (a missing return has no
# single interior line).
id: err-inline-no-return
name: err_inline_no_return
input:
  topic: str
nodes:
  silent:
    kind: code
    input:
      topic: ${input.topic}
    output: str
    code: |
      summary = inputs["topic"].upper()
output: ${silent.output}
