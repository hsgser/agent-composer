# e32 — a `code:` value that is neither a valid `module:function` reference nor inline
# source: a bare dotted token with no colon (a likely typo'd reference). COMPILE: rejected
# at load with a located LoadError naming the fix, rather than silently run as inline
# (where it would fail with a confusing "no main" error). Anchored at the `code:` field.
id: err-malformed-code-ref
name: err_malformed_code_ref
input:
  topic: str
nodes:
  oops:
    kind: code
    input:
      topic: ${input.topic}
    output: str
    code: pkg.mod.helper
output: ${oops.output}
