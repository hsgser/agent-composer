# e28 — an inline CODE body returns the wrong type for its declared `output:`. RUNTIME:
# the engine's typed write boundary rejects it — the SAME path that rejects a wrong-typed
# reference-mode return (e21), reused, not reinvented.
id: err-inline-wrong-type
name: err_inline_wrong_type
input:
  topic: str
nodes:
  calc:
    kind: code
    input:
      topic: ${input.topic}
    output: int
    code: |
      return "not-an-int"
output: ${calc.output}
