name: Publish to PyPI

# Build + test on every push/PR; publish to PyPI only when a GitHub Release is
# published. Publishing uses PyPI Trusted Publishing (OIDC) — no API token or
# secret is stored in the repo. See the one-time PyPI setup in README / below.

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (with all extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run tests
        run: pytest

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Check artifacts
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish for an actual release, never on plain pushes/PRs.
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/p/agent-composer
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
