name: "🐛 Bug Report"
description: Report a bug — something that's broken, crashes, or behaves incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.

        **Before submitting**, please:
        - [ ] Search [existing issues](https://github.com/ngocbh/agent-composer/issues) to avoid duplicates
        - [ ] Update to the latest `main` and confirm the bug still exists
        - [ ] If it's a runtime error, try to reduce it to a minimal flow YAML

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what's broken. Include error messages, tracebacks, or screenshots if relevant.
      placeholder: |
        What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: flow
    attributes:
      label: Minimal Flow / Reproduction
      description: |
        The smallest flow YAML (or `ac` command) that triggers the bug. The more minimal, the faster we can fix it.
      placeholder: |
        # flow.yaml
        nodes:
          ask:
            kind: human_input
            ...
        # then: ac run flow.yaml
      render: yaml
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error output if available.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Agent Composer is affected?
      multiple: true
      options:
        - CLI (`ac run` / `ac chat`)
        - Engine / runtime (scheduler, suspend/resume, checkpoints)
        - Compose (YAML parse / typecheck / build / validate)
        - Nodes (agent, code, model, tool, case, call, map, loop, human_input, wait)
        - Expr (`${...}` grammar)
        - Typesys (types / variable pool / serialization)
        - LLM clients / providers
        - Docs
        - Other
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider (if agent/model-related)
      description: Which provider adapter is involved?
      multiple: true
      options:
        - N/A (no LLM call involved)
        - Anthropic
        - OpenAI
        - Google
        - Ollama

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. Ubuntu 24.04, macOS 15.2, Windows 11
      placeholder: Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version` (the package requires 3.11+)
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agent Composer Version / Commit
      description: Release version, or the short commit hash if installed from source (`git rev-parse --short HEAD`)
      placeholder: "45beb62"

  - type: textarea
    id: logs
    attributes:
      label: Additional Logs / Traceback (optional)
      description: Any extra error output, tracebacks, or screenshots not captured above.
      render: shell

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause Analysis (optional)
      description: |
        If you've dug into the code and identified the root cause, share it here.
        Include file paths, line numbers, and code snippets if possible. This massively speeds up fixes.
      placeholder: |
        The bug is in `compose/build.py` line 585. `_output_value_type` infers the
        binding type from ref leaves only and ignores the `==` operator...

  - type: textarea
    id: proposed-fix
    attributes:
      label: Proposed Fix (optional)
      description: If you have a fix in mind (or a PR ready), describe it here.

  - type: checkboxes
    id: pr-ready
    attributes:
      label: Are you willing to submit a PR for this?
      options:
        - label: I'd like to fix this myself and submit a PR
