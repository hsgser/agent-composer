# Conversational REPL — a turn-by-turn chat, built AS a flow (this is what `ac chat` runs).
# The turn boundary is STRUCTURAL: a LOOP body [human_input -> agent] fixes "get the next
# message, reply" as authored edges. The LLM only fills the reply; the transcript grows
# deterministically in the turn's `output:` bindings (string concatenation in a `${...}`
# template), NOT in the model — no CODE fold node needed.
#
# Carried record ('a): {transcript: str, exited: bool} — threaded turn to turn ('a -> 'a).
# The loop body's `output:` MUST equal this record. Build each field with a binding whose
# TYPE matches the carried field:
#   - `transcript` — a CONCATENATING template (literal text around `${...}` spans) is joined
#     to a `str` by the engine, so it types as `str` and satisfies the carried `str` field.
#   - `exited` — a single lone `${input.exited}` span is a typed passthrough (stays bool).
# (A single lone span with a MULTI-ref expression, e.g. "${a + b}", types as NONE and the
# loop record contract rejects it — keep each output field a plain passthrough or a
# concatenating template.)

id: chat
name: chat
description: A turn-by-turn conversational assistant (plain agent, deterministic transcript).

input:
  opening: str            # seed transcript; `ac chat` passes "" (empty)

defs:
  turn:                   # body: 'a -> 'a over {transcript, exited}
    input:
      transcript: str
      exited: bool
    nodes:
      ask:
        kind: human_input       # suspends each turn; resumed with the user's message
        prompt: "You:"
        output: str
      reply:
        kind: agent
        mode: plain
        input:
          transcript: ${input.transcript}
          message:    ${ask.output}
        output: str
        prompt: |-
          You are a helpful conversational assistant.

          Conversation so far:
          ${transcript}

          User: ${message}
    # Grow the carried transcript with this turn (user message + assistant reply) via a
    # template binding — plain string concatenation in `${...}`, no CODE node needed.
    output:                         # MUST equal the carried record shape
      transcript: |-
        ${input.transcript}

        User: ${ask.output}

        Assistant: ${reply.output}
      exited: ${input.exited}       # a lone span -> typed passthrough (stays bool)

nodes:
  chat:
    kind: loop
    call: turn
    input:                          # the SEED carried record — defines 'a
      transcript: ${input.opening}
      exited: false                 # threaded through; `ac chat` ends the session via /exit
    while: "not ${exited}"          # pre-check over a carried field
    max: 1000                       # required runaway safety cap
output: ${chat.output.transcript}
