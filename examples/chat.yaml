# chat — a turn-by-turn conversational REPL (plain agent; deterministic transcript).
#
# The turn boundary is STRUCTURAL: a LOOP body [human_input -> agent] fixes "get the
# next message, reply" as authored edges. The LLM only fills the reply; the transcript
# grows deterministically in the turn's `output:` bindings (string concatenation in a
# `${...}` template, not a model-built fold), so no CODE node is needed.
# Run it with:  ac chat examples/chat.yaml    (or: ac run, answering each pause)
id: chat
name: chat
description: A turn-by-turn conversational assistant (plain agent, no tools).

input:
  opening: str            # seed transcript; the CLI passes "" (empty)

defs:
  turn:                   # body: 'a -> 'a over {transcript, exited}
    input:
      transcript: str
      exited: bool
    nodes:
      ask:
        kind: human_input       # suspends each turn; resumed with the user's message
        prompt: "You:"
        output: str
      reply:
        kind: agent
        mode: plain
        input:
          transcript: ${input.transcript}
          message:    ${ask.output}
        output: str
        prompt: |-
          You are a helpful conversational assistant.

          Conversation so far:
          ${transcript}

          User: ${message}
    # Grow the carried transcript with this turn (user message + assistant reply) via a
    # template binding — plain string concatenation in `${...}`, no CODE node needed.
    output:
      transcript: |-
        ${input.transcript}

        User: ${ask.output}

        Assistant: ${reply.output}
      exited: ${input.exited}

nodes:
  chat:
    kind: loop
    call: turn
    input:
      transcript: ${input.opening}
      exited: false                 # threaded through; the CLI ends the session via /exit
    while: "not ${exited}"          # a carried-field predicate (verified to parse)
    max: 1000                       # required runaway safety cap
output: ${chat.output.transcript}
