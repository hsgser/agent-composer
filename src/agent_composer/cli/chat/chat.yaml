# The default `ac chat` flow — a composer assistant with flow-op tools.
# Same LOOP-per-turn shape as examples/chat.yaml; the reply agent is tool_calling
# and the transcript grows deterministically in a CODE fold (not model-built).
id: composer-chat
name: composer_chat
description: An assistant that can discover, read, validate, run, and author Agent Composer flows.

input:
  opening: str

defs:
  turn:
    input:
      transcript: str
      exited: bool
    nodes:
      ask:
        kind: human_input
        prompt: "You:"
        output: str
      reply:
        kind: agent
        mode: tool_calling
        tools: [list_flows, read_flow, validate_flow, run_flow, write_flow]
        input:
          transcript: ${input.transcript}
          message:    ${ask.output}
        output: str
        prompt: |-
          You are Agent Composer's assistant. You help the user discover, read,
          validate, run, and author flows (Compose YAML) using your tools. Prefer
          validate_flow before write_flow, and read_flow before editing.

          Conversation so far:
          ${transcript}

          User: ${message}
      fold:
        kind: code
        code: agent_composer.cli.chat.fns:fold_turn
        input:
          transcript: ${input.transcript}
          message:    ${ask.output}
          reply:      ${reply.output}
          exited:     ${input.exited}
        output:
          transcript: str
          exited: bool
    output: ${fold.output}

nodes:
  chat:
    kind: loop
    call: turn
    input:
      transcript: ${input.opening}
      exited: false
    while: "not ${exited}"
    max: 1000
output: ${chat.output.transcript}
