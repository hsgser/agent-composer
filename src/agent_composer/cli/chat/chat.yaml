# The default `ac chat` flow — a composer assistant with flow-op tools.
# Same LOOP-per-turn shape as examples/chat.yaml; the reply agent is tool_calling
# and the transcript grows deterministically in the turn's `output:` bindings
# (string concatenation in `${...}`, not a model-built or CODE-node fold).
id: composer-chat
name: composer_chat
description: An assistant that can discover, read, validate, run, and author Agent Composer flows.

input:
  opening: str

defs:
  turn:
    input:
      transcript: str
      exited: bool
    nodes:
      ask:
        kind: human_input
        prompt: "You:"
        output: str
      reply:
        kind: agent
        mode: tool_calling
        # The engine default is no cap (-1); bound this interactive agent so a runaway
        # model can't hang the REPL. 100 fits the 5 flow-op tools' exploratory turns.
        env:
          max_tool_iterations: 100
        tools: [list_flows, read_flow, validate_flow, run_flow, write_flow]
        input:
          transcript: ${input.transcript}
          message:    ${ask.output}
        output: str
        prompt: |-
          You are Agent Composer's assistant. You help the user discover, read,
          validate, run, and author flows (Compose YAML) using your tools. Prefer
          validate_flow before write_flow, and read_flow before editing.

          Conversation so far:
          ${transcript}

          User: ${message}
    # Grow the carried transcript with this turn (user message + assistant reply) via a
    # template binding — plain string concatenation in `${...}`, no CODE node needed.
    output:
      transcript: |-
        ${input.transcript}

        User: ${ask.output}

        Assistant: ${reply.output}
      exited: ${input.exited}

nodes:
  chat:
    kind: loop
    call: turn
    input:
      transcript: ${input.opening}
      exited: false
    while: "not ${exited}"
    max: 1000
output: ${chat.output.transcript}
